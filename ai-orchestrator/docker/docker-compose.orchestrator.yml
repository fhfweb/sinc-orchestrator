    profiles: ["soak"]
    working_dir: /app
    volumes:
      - ..:/app:ro
      - sinc-orchestrator-data:/app/state
    environment:
      <<: *orch-otel-env
      PYTHONUNBUFFERED: "1"
      ORCHESTRATOR_SOAK_BASE_URL: ${ORCHESTRATOR_SOAK_BASE_URL:-http://orchestrator-streaming:8765}
      ORCHESTRATOR_SOAK_API_KEY: ${ORCHESTRATOR_SOAK_API_KEY:-dev}
      ORCHESTRATOR_SOAK_PROJECT_ID: ${ORCHESTRATOR_SOAK_PROJECT_ID:-sinc}
      ORCHESTRATOR_SOAK_AGENT_NAME: ${ORCHESTRATOR_SOAK_AGENT_NAME:-soak-agent}
      ORCHESTRATOR_SOAK_CYCLES: ${ORCHESTRATOR_SOAK_CYCLES:-10080}
      ORCHESTRATOR_SOAK_INTERVAL_SECONDS: ${ORCHESTRATOR_SOAK_INTERVAL_SECONDS:-120}
    command: >-
      sh -lc "export PYTHONPATH=/app && until curl -fsS $${ORCHESTRATOR_SOAK_BASE_URL}/health >/dev/null; do sleep 5; done && python scripts/soak_python_control_plane.py --base-url $${ORCHESTRATOR_SOAK_BASE_URL} --api-key $${ORCHESTRATOR_SOAK_API_KEY} --project-id $${ORCHESTRATOR_SOAK_PROJECT_ID} --agent-name $${ORCHESTRATOR_SOAK_AGENT_NAME} --cycles $${ORCHESTRATOR_SOAK_CYCLES} --interval-s $${ORCHESTRATOR_SOAK_INTERVAL_SECONDS}"
    restart: "no"
    depends_on:
      orchestrator-streaming:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - sinc-platform-net

  opencode-sandbox:
    build:
      context: ..
      dockerfile: docker/Dockerfile.opencode
    image: sinc-opencode:local
    container_name: sinc-opencode-sandbox
    working_dir: /workspace
    volumes:
      - ..:/workspace          # shared workspace — agent edits land here
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_HOST: http://ollama:11434
      SINC_MCP_URL: http://orchestrator-streaming:8765/mcp
      OPENCODE_PORT: "9000"
      SINC_TENANT_ID: ${ORCH_TENANT_ID:-local}
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/global/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    depends_on:
      orchestrator-streaming:
        condition: service_healthy
    networks:
      - sinc-platform-net

  peer-review-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.peer-review
    image: sinc-peer-review-agent:local
    container_name: sinc-peer-review-agent
    working_dir: /app
    volumes:
      - ..:/app:ro
    environment:
      <<: *orch-otel-env
      PYTHONUNBUFFERED: "1"
      ORCHESTRATOR_URL: http://orchestrator-streaming:8765
      ORCHESTRATOR_API_KEY: ${ORCHESTRATOR_PEER_REVIEW_API_KEY:-}
      TENANT_ID: ${ORCHESTRATOR_PEER_REVIEW_TENANT_ID:-local}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REVIEW_THRESHOLD: ${REVIEW_THRESHOLD:-0.8}
      MAX_REVIEW_CYCLES: ${MAX_REVIEW_CYCLES:-3}
      PEER_REVIEW_POLL_S: ${PEER_REVIEW_POLL_S:-20}
      OTEL_SERVICE_NAME: peer-review-agent
    command: >-
      sh -lc "
        export PYTHONPATH=/app &&
        if [ -z \"$ORCHESTRATOR_API_KEY\" ]; then
          echo 'peer-review-agent idle: ORCHESTRATOR_PEER_REVIEW_API_KEY not set';
          tail -f /dev/null;
        fi &&
        python services/peer_review_agent.py
      "
    restart: unless-stopped
    depends_on:
      orchestrator-streaming:
        condition: service_started
      otel-collector:
        condition: service_started
    networks:
      - sinc-platform-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: sinc-otel-collector
    user: "0:0"
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
      - sinc-otel-collector-data:/var/lib/otel
    ports:
      - "4317:4317"
      - "4318:4318"
      - "55679:55679"
    restart: unless-stopped
    networks:
      - sinc-platform-net

