name: orchestrator-platform

x-otel-env: &orch-otel-env
  OTEL_ENABLED: ${OTEL_ENABLED:-true}
  OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}"

services:
  orchestrator-task-db:
    image: postgres:17-alpine
    container_name: sinc-orchestrator-task-db
    environment:
      POSTGRES_DB: orchestrator_tasks
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: "${ORCH_DB_PASSWORD:?ORCH_DB_PASSWORD is required - set it in .env}"
    ports:
      - "5434:5432"
    volumes:
      - sinc-orchestrator-taskdb-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator -d orchestrator_tasks"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    networks:
      - sinc-platform-net

  neo4j:
    image: neo4j:5
    container_name: sinc-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_AUTH:?NEO4J_AUTH is required - set it in .env (format: neo4j/password)}"
    volumes:
      - sinc-neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    networks:
      - sinc-platform-net

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: sinc-qdrant
    ports:
      - "6333:6333"
    volumes:
      - sinc-qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '(echo >/dev/tcp/localhost/6333) 2>/dev/null'"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    networks:
      - sinc-platform-net

  redis:
    image: redis:7-alpine
    container_name: sinc-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - sinc-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    networks:
      - sinc-platform-net

  ollama:
    image: ollama/ollama:latest
    container_name: sinc-ollama
    runtime: nvidia
    ports:
      - "11435:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_KEEP_ALIVE: "20m"
      OLLAMA_GPU_OVERHEAD: "2147483648"
      CUDA_VISIBLE_DEVICES: "0"
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - sinc-ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - sinc-platform-net

  ollama-model-puller:
    image: ollama/ollama:latest
    container_name: sinc-ollama-model-puller
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        sleep 10
        ollama pull qwen2.5:7b-instruct-q4_K_M
        ollama pull qwen2.5-coder:14b-instruct-q4_K_M
        ollama pull qwen2.5:32b-instruct-q4_K_M
        ollama pull nomic-embed-text
    networks:
      - sinc-platform-net
    depends_on:
      - ollama

  orchestrator-streaming:
    build:
      context: ..
      dockerfile: docker/Dockerfile.runtime
    image: sinc-orchestrator-runtime:local
    container_name: sinc-orchestrator-streaming
    working_dir: /app
    volumes:
      - ..:/app
      - sinc-orchestrator-data:/app/state
    environment:
      <<: *orch-otel-env
      PYTHONUNBUFFERED: "1"
      ORCH_DB_NAME: orchestrator_tasks
      ORCH_DB_USER: orchestrator
      ORCH_DB_PASSWORD: ${ORCH_DB_PASSWORD:-9de4c0a8660df01207a8a773e2dcfdb8}
      ORCH_DB_HOST: orchestrator-task-db
      ORCH_DB_PORT: "5432"
      ORCH_STREAMING_PORT: "8765"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_CACHE_DB: "2"
      REDIS_URL: redis://redis:6379/2
      ASK_CACHE_TTL: "300"
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ADMIN_API_KEY: "${ADMIN_API_KEY:?ADMIN_API_KEY is required - set it in .env}"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SIGNUP_ENABLED: ${SIGNUP_ENABLED:-true}
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL_GENERAL: ${OLLAMA_MODEL_GENERAL:-qwen2.5:7b-instruct-q4_K_M}
      OLLAMA_MODEL_CODE: ${OLLAMA_MODEL_CODE:-qwen2.5-coder:14b-instruct-q4_K_M}
      OLLAMA_MODEL_REASONING: ${OLLAMA_MODEL_REASONING:-qwen2.5:32b-instruct-q4_K_M}
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/changeme-neo4j-password}
      GIT_WEBHOOK_SECRET: ${GIT_WEBHOOK_SECRET:-}
      OPENCODE_URL: http://opencode-sandbox:9000
      OPENCODE_ENABLED: ${OPENCODE_ENABLED:-1}
      OPENCODE_PROVIDER_CODING: ${OPENCODE_PROVIDER_CODING:-anthropic}
      OPENCODE_MODEL_CODING: ${OPENCODE_MODEL_CODING:-claude-sonnet-4-6}
      ORCHESTRATOR_EMBEDDED_SCHEDULER_ENABLED: "0"
      ORCHESTRATOR_EMBEDDED_OBSERVER_ENABLED: "0"
      ORCHESTRATOR_EMBEDDED_READINESS_ENABLED: "0"
      ORCHESTRATOR_EMBEDDED_EXTERNAL_BRIDGE_ENABLED: "0"
      ORCHESTRATOR_EMBEDDED_POLICY_ENABLED: "0"
      ORCHESTRATOR_EMBEDDED_MUTATION_ENABLED: "0"
      ORCHESTRATOR_EMBEDDED_FINOPS_ENABLED: "0"
      ORCHESTRATOR_EMBEDDED_DEPLOY_VERIFY_ENABLED: "0"
      ORCHESTRATOR_EMBEDDED_PATTERN_PROMOTION_ENABLED: "0"
      ORCHESTRATOR_EMBEDDED_RELEASE_ENABLED: "0"
      ORCHESTRATOR_EMBEDDED_TASK_DAG_PROJECTION_ENABLED: "1"
      ORCHESTRATOR_EMBEDDED_COGNITIVE_BATCH_ENABLED: "0"
      ORCHESTRATOR_TASK_DAG_PROJECTION_INTERVAL_SECONDS: ${ORCHESTRATOR_TASK_DAG_PROJECTION_INTERVAL_SECONDS:-20}
    ports:
      - "8765:8765"
    command: >-
      sh -lc "
        export PYTHONPATH=/app &&
        uvicorn services.streaming_server_v2:app --host 0.0.0.0 --port 8765
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8765/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    depends_on:
      orchestrator-task-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - sinc-platform-net

  orchestrator-ingest-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ingest
    image: sinc-orchestrator-ingest:local
    container_name: sinc-orchestrator-ingest-worker
    working_dir: /app
    volumes:
      - ..:/app:ro
      - sinc-orchestrator-data:/app/state
      - sinc-ingest-clones:/tmp/ingest-clones
    environment:
      <<: *orch-otel-env
      PYTHONUNBUFFERED: "1"
      ORCH_DB_NAME: orchestrator_tasks
      ORCH_DB_USER: orchestrator
      ORCH_DB_PASSWORD: ${ORCH_DB_PASSWORD:-9de4c0a8660df01207a8a773e2dcfdb8}
      ORCH_DB_HOST: orchestrator-task-db
      ORCH_DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_CACHE_DB: "2"
      REDIS_URL: redis://redis:6379/2
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/changeme-neo4j-password}
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      DISPATCHES_DIR: /app/state/external-agent-bridge/dispatches
      GIT_CLONE_BASE: /tmp/ingest-clones
    command: >-
      sh -lc "
        export PYTHONPATH=/app &&
        python services/ingest_pipeline.py watch --dir /app/state/external-agent-bridge/dispatches --interval 10
      "
    restart: unless-stopped
    depends_on:
      orchestrator-task-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
      otel-collector:
        condition: service_started
    networks:
      - sinc-platform-net

  orchestrator-scheduler:
