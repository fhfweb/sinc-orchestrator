name: sinc-n5-viva

services:
  # ── INFRASTRUCTURE ──────────────────────────────────────────────────────────
  orchestrator-db:
    image: postgres:17-alpine
    container_name: sinc-n5-db
    environment:
      POSTGRES_DB:       orchestrator_tasks
      POSTGRES_USER:     orchestrator
      POSTGRES_PASSWORD: ${ORCH_DB_PASSWORD:?ORCH_DB_PASSWORD is required}
    ports:
      - "5434:5432"
    volumes:
      - sinc-n5-db-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator -d orchestrator_tasks"]
      interval: 10s
    restart: unless-stopped
    networks:
      - sinc-net

  redis:
    image: redis:7-alpine
    container_name: sinc-n5-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - sinc-n5-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
    restart: unless-stopped
    networks:
      - sinc-net

  neo4j:
    image: neo4j:5
    container_name: sinc-n5-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/sinc-n5-pass}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - sinc-n5-neo4j-data:/data
    restart: unless-stopped
    networks:
      - sinc-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sinc-n5-qdrant
    ports:
      - "6333:6333"
    volumes:
      - sinc-n5-qdrant-data:/qdrant/storage
    restart: unless-stopped
    networks:
      - sinc-net

  # ── ORCHESTRATOR SERVICES (BUILD FROM N5 DOCKERFILE) ────────────────────────
  
  orchestrator-streaming:
    build:
      context: ..
      dockerfile: docker/Dockerfile.n5
    container_name: sinc-n5-streaming
    volumes:
      - sinc-n5-state:/app/state
      - sinc-n5-logs:/app/logs
    environment: &env_base
      APP_ENV:              production
      ADMIN_API_KEY:        ${ADMIN_API_KEY:?ADMIN_API_KEY is required}
      ORCHESTRATOR_API_KEY: ${ADMIN_API_KEY}
      ORCH_DB_HOST:         orchestrator-db
      ORCH_DB_PORT:         5432
      ORCH_DB_NAME:         orchestrator_tasks
      ORCH_DB_USER:         orchestrator
      ORCH_DB_PASSWORD:     ${ORCH_DB_PASSWORD}
      REDIS_HOST:           redis
      REDIS_PORT:           6379
      REDIS_URL:            redis://redis:6379/1
      NEO4J_URI:            bolt://neo4j:7687
      NEO4J_AUTH:           ${NEO4J_AUTH}
      QDRANT_HOST:          qdrant
      QDRANT_PORT:          6333
      ORCH_STREAMING_PORT:  8765
    ports:
      - "8765:8765"
    depends_on:
      orchestrator-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sinc-net

  orchestrator-core:
    build:
      context: ..
      dockerfile: docker/Dockerfile.n5
    container_name: sinc-n5-core
    command: ["python", "services/orchestrator_core.py"]
    volumes:
      - sinc-n5-state:/app/state
    environment:
      <<: *env_base
      REDIS_URL:           redis://redis:6379/2
    depends_on:
      orchestrator-db:
        condition: service_healthy
    restart: always
    networks:
      - sinc-net

  ingest-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.n5
    container_name: sinc-n5-ingest-worker
    command: ["python", "services/ingest_pipeline.py", "watch", "--dir", "/app/state/external-agent-bridge/dispatches", "--interval", "10"]
    volumes:
      - sinc-n5-clones:/tmp/ingest-clones
      - sinc-n5-state:/app/state
    environment:
      <<: *env_base
      GIT_CLONE_BASE: /tmp/ingest-clones
    depends_on:
      orchestrator-db:
        condition: service_healthy
    restart: always
    networks:
      - sinc-net

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.n5
    container_name: sinc-n5-scheduler
    command: ["python", "runtime/agent_scheduler/scheduler.py", "--max-assign", "3", "--interval", "30"]
    environment:
      <<: *env_base
    depends_on:
      orchestrator-db:
        condition: service_healthy
    restart: always
    networks:
      - sinc-net

  heartbeat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.n5
    container_name: sinc-n5-heartbeat
    command: ["python", "scripts/v2/heartbeat_monitor.py", "--stale-threshold", "90", "--interval", "60"]
    environment:
      <<: *env_base
    depends_on:
      orchestrator-db:
        condition: service_healthy
    restart: always
    networks:
      - sinc-net

  peer-review:
    build:
      context: ..
      dockerfile: docker/Dockerfile.n5
    container_name: sinc-n5-peer-review
    command: ["python", "services/peer_review_agent.py"]
    environment:
      <<: *env_base
      ORCHESTRATOR_URL: http://sinc-n5-core:8767
    depends_on:
      orchestrator-core:
        condition: service_started
    restart: always
    networks:
      - sinc-net

volumes:
  sinc-n5-db-data:
  sinc-n5-redis-data:
  sinc-n5-neo4j-data:
  sinc-n5-qdrant-data:
  sinc-n5-state:
  sinc-n5-logs:
  sinc-n5-clones:

networks:
  sinc-net:
    driver: bridge
